name: "Android Build, Sign & Release"
description: "Builds an Android app using Gradle, detects version, creates git tags, scans with VirusTotal and signs."
author: "FreetimeMaker"
branding:
  icon: activity
  color: green

inputs:
  keystore:
    description: "Base64 encoded keystore (ignored if use_repo_keystore=true)"
    required: false
  keystore_password:
    required: true
  key_alias:
    required: true
  key_password:
    required: true
  gradle_task:
    description: "Gradle task to run"
    default: "assembleRelease"
  use_repo_keystore:
    description: "Use a keystore stored in the repository"
    default: "false"
  repo_keystore_path:
    description: "Path to the repo keystore"
    default: "release-key.jks"
  auto_tag:
    description: "Automatically create git tag based on versionName"
    default: "true"
  virustotal_scan:
    description: "Enable VirusTotal scanning before signing"
    default: "false"
  virustotal_api_key:
    description: "VirusTotal API key"
    required: false
  virustotal_timeout:
    description: "Max seconds to wait for VirusTotal analysis"
    default: "120"

outputs:
  signed_apk:
    description: "Path to the final signed APK"
  version_name:
    description: "Detected versionName"
  version_code:
    description: "Detected versionCode"

runs:
  using: "composite"
  steps:

    # ---------------------------------------------------------
    # 1. Select keystore source
    # ---------------------------------------------------------
    - name: Select keystore source
      id: select_keystore
      shell: bash
      run: |
        set -e
        if [[ "${{ inputs.use_repo_keystore }}" == "true" ]]; then
          echo "Using repository keystore: ${{ inputs.repo_keystore_path }}"
          if [[ ! -f "${{ inputs.repo_keystore_path }}" ]]; then
            echo "ERROR: repo keystore not found"
            exit 1
          fi
          echo "keystore_path=${{ inputs.repo_keystore_path }}" >> $GITHUB_OUTPUT
        else
          echo "Using Base64 keystore input"
          echo "${{ inputs.keystore }}" | base64 -d > release-key.jks
          echo "keystore_path=release-key.jks" >> $GITHUB_OUTPUT
        fi

    # ---------------------------------------------------------
    # 2. Make Gradle executable
    # ---------------------------------------------------------
    - name: Make Gradle executable
      shell: bash
      run: chmod +x ./gradlew

    # ---------------------------------------------------------
    # 3. Detect versionName + versionCode
    # ---------------------------------------------------------
    - name: Detect version
      id: version
      shell: bash
      run: |
        set -e
        VERSION_NAME=$(grep versionName -R app/build.gradle* | sed 's/.*"\(.*\)".*/\1/')
        VERSION_CODE=$(grep versionCode -R app/build.gradle* | sed 's/.* //')
        echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
        echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

    # ---------------------------------------------------------
    # 4. Auto-create git tag
    # ---------------------------------------------------------
    - name: Create git tag
      if: ${{ inputs.auto_tag == 'true' }}
      shell: bash
      run: |
        set -e
        TAG="v${{ steps.version.outputs.version_name }}"
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git tag -f "$TAG"
        git push -f origin "$TAG"

    # ---------------------------------------------------------
    # 5. Build Android App
    # ---------------------------------------------------------
    - name: Build Android App
      shell: bash
      run: |
        set -e
        ./gradlew ${{ inputs.gradle_task }}

    # ---------------------------------------------------------
    # 6. VirusTotal Scan (unsigned APK)
    # ---------------------------------------------------------
    - name: VirusTotal Scan (unsigned APK)
      if: ${{ inputs.virustotal_scan == 'true' }}
      id: vt_scan
      shell: bash
      run: |
        set -e

        if [[ -z "${{ inputs.virustotal_api_key }}" ]]; then
          echo "ERROR: VirusTotal scan enabled but no API key provided"
          exit 1
        fi

        echo "Locating unsigned APK for VirusTotal scan..."
        UNSIGNED=$(find app/build/outputs/apk -name "*-unsigned.apk" | head -n 1)

        if [[ -z "$UNSIGNED" ]]; then
          echo "ERROR: No unsigned APK found for VirusTotal scan"
          exit 1
        fi

        echo "Uploading APK to VirusTotal..."
        RESPONSE=$(curl -s -X POST "https://www.virustotal.com/api/v3/files" \
          -H "x-apikey: ${{ inputs.virustotal_api_key }}" \
          --form "file=@${UNSIGNED}")

        ANALYSIS_ID=$(echo "$RESPONSE" | grep -o '"id":"[^"]*' | cut -d'"' -f4)

        if [[ -z "$ANALYSIS_ID" ]]; then
          echo "ERROR: Failed to upload file to VirusTotal"
          echo "$RESPONSE"
          exit 1
        fi

        echo "VirusTotal analysis ID: $ANALYSIS_ID"
        echo "Waiting for analysis result..."

        TIMEOUT=${{ inputs.virustotal_timeout }}
        ELAPSED=0

        while [[ $ELAPSED -lt $TIMEOUT ]]; do
          RESULT=$(curl -s -X GET "https://www.virustotal.com/api/v3/analyses/$ANALYSIS_ID" \
            -H "x-apikey: ${{ inputs.virustotal_api_key }}")

          STATUS=$(echo "$RESULT" | grep -o '"status":"[^"]*' | cut -d'"' -f4)

          if [[ "$STATUS" == "completed" ]]; then
            MALICIOUS=$(echo "$RESULT" | grep -o '"malicious":[0-9]*' | cut -d':' -f2)
            echo "VirusTotal malicious count: $MALICIOUS"

            if [[ "$MALICIOUS" != "0" ]]; then
              echo "ERROR: VirusTotal detected malicious content"
              echo "$RESULT"
              exit 1
            fi

            echo "VirusTotal scan passed"
            exit 0
          fi

          sleep 5
          ELAPSED=$((ELAPSED + 5))
        done

        echo "ERROR: VirusTotal scan timed out after ${TIMEOUT}s"
        exit 1

    # ---------------------------------------------------------
    # 7. Locate apksigner
    # ---------------------------------------------------------
    - name: Locate apksigner
      id: find_apksigner
      shell: bash
      run: |
        set -e
        APKSIGNER=$(find /usr/local/lib/android/sdk/build-tools -name apksigner | head -n 1)
        echo "apksigner=$APKSIGNER" >> $GITHUB_OUTPUT

    # ---------------------------------------------------------
    # 8. Find unsigned APK
    # ---------------------------------------------------------
    - name: Find unsigned APK
      id: find_apk
      shell: bash
      run: |
        set -e
        UNSIGNED=$(find app/build/outputs/apk -name "*-unsigned.apk" | head -n 1)
        echo "unsigned_apk=$UNSIGNED" >> $GITHUB_OUTPUT

    # ---------------------------------------------------------
    # 9. Sign APK
    # ---------------------------------------------------------
    - name: Sign APK
      id: sign
      shell: bash
      run: |
        set -e
        SIGNED="app-release-signed.apk"
        "${{ steps.find_apksigner.outputs.apksigner }}" sign \
          --ks "${{ steps.select_keystore.outputs.keystore_path }}" \
          --ks-pass pass:${{ inputs.keystore_password }} \
          --ks-key-alias ${{ inputs.key_alias }} \
          --key-pass pass:${{ inputs.key_password }} \
          --out "$SIGNED" \
          "${{ steps.find_apk.outputs.unsigned_apk }}"
        echo "signed_apk=$SIGNED" >> $GITHUB_OUTPUT

    # ---------------------------------------------------------
    # 10. Verify signature
    # ---------------------------------------------------------
    - name: Verify signature
      shell: bash
      run: |
        set -e
        "${{ steps.find_apksigner.outputs.apksigner }}" verify --verbose \
          "${{ steps.sign.outputs.signed_apk }}"
