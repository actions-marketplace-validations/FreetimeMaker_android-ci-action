name: "Android Build, Sign & Release"
description: "Builds an Android app using Gradle, signs the APK with a provided or repo-based keystore and outputs the signed artifact."
author: "FreetimeMaker"
branding: 
  icon: activity
  color: green

inputs:
  keystore:
    description: "Base64 encoded keystore (ignored if use_repo_keystore=true)"
    required: false
  keystore_password:
    required: true
  key_alias:
    required: true
  key_password:
    required: true
  gradle_task:
    description: "Gradle task to run"
    default: "assembleRelease"
  use_repo_keystore:
    description: "Use a keystore stored in the repository instead of Base64 input"
    default: "false"
  repo_keystore_path:
    description: "Path to the keystore inside the repository"
    default: "release-key.jks"

outputs:
  signed_apk:
    description: "Path to the signed APK"

runs:
  using: "composite"
  steps:

    - name: Select keystore source
      id: select_keystore
      shell: bash
      run: |
        set -e

        if [[ "${{ inputs.use_repo_keystore }}" == "true" ]]; then
          echo "Using repository keystore: ${{ inputs.repo_keystore_path }}"
          if [[ ! -f "${{ inputs.repo_keystore_path }}" ]]; then
            echo "ERROR: repo keystore not found at ${{ inputs.repo_keystore_path }}"
            exit 1
          fi
          echo "keystore_path=${{ inputs.repo_keystore_path }}" >> $GITHUB_OUTPUT
        else
          echo "Using Base64 keystore input"
          echo "${{ inputs.keystore }}" | base64 -d > release-key.jks
          echo "keystore_path=release-key.jks" >> $GITHUB_OUTPUT
        fi

    - name: Make Gradle executable
      shell: bash
      run: chmod +x ./gradlew

    - name: Build Android App
      shell: bash
      run: |
        set -e
        ./gradlew ${{ inputs.gradle_task }}

    - name: Locate apksigner
      id: find_apksigner
      shell: bash
      run: |
        set -e
        APKSIGNER=$(find /usr/local/lib/android/sdk/build-tools -name apksigner | head -n 1)
        if [ -z "$APKSIGNER" ]; then
          echo "ERROR: apksigner not found"
          exit 1
        fi
        echo "apksigner=$APKSIGNER" >> $GITHUB_OUTPUT

    - name: Find unsigned APK
      id: find_apk
      shell: bash
      run: |
        set -e
        UNSIGNED=$(find app/build/outputs/apk -name "*-unsigned.apk" | head -n 1)
        if [ -z "$UNSIGNED" ]; then
          echo "ERROR: No unsigned APK found"
          exit 1
        fi
        echo "unsigned_apk=$UNSIGNED" >> $GITHUB_OUTPUT

    - name: Sign APK
      id: sign
      shell: bash
      run: |
        set -e
        SIGNED="app-release-signed.apk"

        "${{ steps.find_apksigner.outputs.apksigner }}" sign \
          --ks "${{ steps.select_keystore.outputs.keystore_path }}" \
          --ks-pass pass:${{ inputs.keystore_password }} \
          --ks-key-alias ${{ inputs.key_alias }} \
          --key-pass pass:${{ inputs.key_password }} \
          --out "$SIGNED" \
          "${{ steps.find_apk.outputs.unsigned_apk }}"

        echo "signed_apk=$SIGNED" >> $GITHUB_OUTPUT

    - name: Verify signature
      shell: bash
      run: |
        set -e
        "${{ steps.find_apksigner.outputs.apksigner }}" verify --verbose \
          "${{ steps.sign.outputs.signed_apk }}"
